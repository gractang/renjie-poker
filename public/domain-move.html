<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renjie Poker Has a New Name</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        --color-text: #2c2418;
        --color-text-muted: #8a7e6e;
        --color-background: #f7f3ec;
        --color-surface: #fffdf9;
        --color-border: #e4ddd2;
        --color-accent: #40916c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--color-text);
        background:
          radial-gradient(circle at top, color-mix(in srgb, var(--color-accent) 9%, transparent), transparent 55%),
          var(--color-background);
        font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(680px, 100%);
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        padding: 28px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 1.4rem;
        letter-spacing: -0.01em;
      }

      p {
        margin: 0 0 14px;
        color: var(--color-text);
      }

      .countdown-line {
        color: var(--color-text-muted);
      }

      .target-link {
        color: var(--color-text);
        text-underline-offset: 2px;
      }

      .target-link:hover {
        color: var(--color-accent);
      }

      .countdown {
        display: inline-block;
        min-width: 1ch;
        color: var(--color-text);
        font-weight: 700;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 4px;
        padding: 9px 13px;
        border: 1px solid var(--color-border);
        background: transparent;
        color: var(--color-text);
        text-decoration: none;
        font-size: 0.95rem;
      }

      .btn:hover {
        border-color: var(--color-accent);
        background: var(--color-accent);
        color: var(--color-background);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>New Name, Same Game</h1>
      <p>
        Renjie Poker has a new home at
        <a class="target-link" href="https://www.pickem-poker.com">pickem-poker.com</a>.
      </p>
      <p class="countdown-line">
        Redirecting you to
        <a class="target-link" href="https://www.pickem-poker.com" id="target-link">www.pickem-poker.com</a>
        in <span class="countdown" id="countdown">5</span>...
      </p>
      <a class="btn" href="https://www.pickem-poker.com" id="manual-link">
        Click here if you are not automatically redirected
      </a>
    </main>

    <script>
      (() => {
        const TARGET_URL = "https://www.pickem-poker.com";
        const countdownEl = document.getElementById("countdown");
        const manualLink = document.getElementById("manual-link");
        const targetLink = document.getElementById("target-link");

        if (!countdownEl || !manualLink || !targetLink) return;

        manualLink.href = TARGET_URL;
        targetLink.href = TARGET_URL;

        let remaining = 5;
        const timer = window.setInterval(() => {
          remaining -= 1;
          countdownEl.textContent = String(remaining);
          if (remaining <= 0) {
            window.clearInterval(timer);
            window.location.href = TARGET_URL;
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
