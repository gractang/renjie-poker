<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play Pick'em Poker, save your stats, battle on the leaderboard!" />
    <meta name="theme-color" content="#f5f5f0" />
    <title>Pick'em Poker</title>

    <script>
      (() => {
        const oldHosts = new Set(["renjiepoker.com", "www.renjiepoker.com"]);
        if (!oldHosts.has(window.location.hostname)) return;
        if (window.location.pathname !== "/" && window.location.pathname !== "/index.html") return;
        window.location.replace("/domain-move.html");
      })();
    </script>
    <script>
      (() => {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const saved = localStorage.getItem("theme");
        const dark = saved ? saved === "dark" : prefersDark;
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
