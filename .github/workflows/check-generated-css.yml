name: Check Generated CSS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-generated-css:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check:tailwind
